<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Pembelanjaan & Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h2 class="mb-4">Dashboard Kas & Belanja</h2>
        
        <div class="row mb-4">
            <div class="col-md-4">
                <div class="card text-white bg-success mb-3">
                    <div class="card-body">
                        <h5 class="card-title">Saldo Kas Saat Ini</h5>
                        <h3 id="saldoText">Rp 0</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-white bg-danger mb-3">
                    <div class="card-body">
                        <h5 class="card-title">Total Hutang</h5>
                        <h3 id="hutangText">Rp 0</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-white bg-info mb-3">
                    <div class="card-body">
                        <h5 class="card-title">Estimasi Bertahan</h5>
                        <h4 id="runwayText">0 Hari</h4>
                        <small id="runwayDetail">0 Minggu | 0 Bulan</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-5">
            <div class="card-header">Input Pembelanjaan Baru</div>
            <div class="card-body">
                <form id="formBelanja">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label>Jenis Barang</label>
                            <input type="text" class="form-control" id="jenisBarang" required>
                        </div>
                        <div class="col-md-3 mb-3">
                            <label>Berat (Kg)</label>
                            <input type="number" step="0.01" class="form-control" id="berat" required>
                        </div>
                        <div class="col-md-3 mb-3">
                            <label>Harga Satuan</label>
                            <input type="number" class="form-control" id="hargaSatuan" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label>Metode Pembayaran</label>
                            <select class="form-control" id="metode" required>
                                <option value="Cash">Cash</option>
                                <option value="Transfer">Transfer</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label>Status</label>
                            <select class="form-control" id="status" required>
                                <option value="Lunas">Lunas</option>
                                <option value="Hutang">Hutang</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">Simpan Transaksi</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Ganti dengan URL Web App Apps Script Anda
        const SCRIPT_URL = 'URL_WEB_APP_ANDA_DISINI';

        document.getElementById('formBelanja').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const data = {
                jenis_barang: document.getElementById('jenisBarang').value,
                berat: document.getElementById('berat').value,
                harga_satuan: document.getElementById('hargaSatuan').value,
                metode_pembayaran: document.getElementById('metode').value,
                status: document.getElementById('status').value
            };

            fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify(data)
            }).then(response => response.json())
              .then(result => {
                  alert('Data berhasil disimpan!');
                  document.getElementById('formBelanja').reset();
                  // Panggil fungsi untuk update dashboard disini nantinya
              }).catch(error => console.error('Error:', error));
        });

        // Logika untuk fetch GET data dan menghitung grafik diletakkan di sini
    </script>
</body>
</html>
